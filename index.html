<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Monitor de Dor</title>

    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#c08457" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="PainMonitor" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <style>
      :root {
        --bg-color: #1a1a1a;
        --card-bg: #2d2d2d;
        --text-main: #f0e6d6;
        --secondary: #e6b38a;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* --- TELA SPLASH / LOGIN --- */
      #loginScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg-color);
        z-index: 2000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .logo-icon {
        font-size: 4rem;
        margin-bottom: 10px;
        text-shadow: 0 0 20px var(--secondary);
      }

      /* Campos de Login */
      .auth-input {
        width: 80%;
        max-width: 280px;
        padding: 14px;
        margin-bottom: 12px;
        border-radius: 8px;
        border: 1px solid #4d4d4d;
        background: #262626;
        color: white;
        font-size: 1rem;
        box-sizing: border-box;
      }
      .auth-input:focus {
        outline: none;
        border-color: var(--secondary);
      }

      .btn-group {
        display: flex;
        gap: 10px;
        width: 80%;
        max-width: 280px;
        margin-top: 10px;
      }
      .login-btn {
        flex: 1;
        padding: 14px;
        border-radius: 8px;
        border: none;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        background: white;
        color: #1a1a1a;
      }
      .register-btn {
        flex: 1;
        padding: 14px;
        border-radius: 8px;
        border: 1px solid var(--secondary);
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        background: transparent;
        color: var(--secondary);
      }
      #loginError {
        color: #ff7f50;
        font-size: 0.9rem;
        margin-top: 15px;
        display: none;
        text-align: center;
        max-width: 280px;
      }

      /* --- APP PRINCIPAL --- */
      #appScreen {
        display: none;
        width: 100%;
        max-width: 400px;
        padding-bottom: 80px;
      }
      .container {
        background: var(--card-bg);
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        border: 1px solid #3d3d3d;
      }
      h2,
      h4 {
        color: var(--secondary);
        margin-top: 0;
      }
      .header-area {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logout-btn {
        background: none;
        border: 1px solid #666;
        color: #aaa;
        padding: 5px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.8rem;
      }

      .slider-container {
        text-align: center;
        margin: 20px 0;
      }
      #painValueDisplay {
        font-size: 4rem;
        font-weight: bold;
        transition: color 0.3s;
      }
      input[type="range"] {
        width: 100%;
        margin: 15px 0;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 25px;
        justify-content: flex-end;
      }
      .tag {
        padding: 12px 18px;
        border: 2px solid;
        border-radius: 25px;
        background: #262626;
        cursor: pointer;
        font-weight: bold;
      }
      .tag-tornD {
        border-color: #3498db;
        color: #3498db;
      }
      .tag-tornE {
        border-color: #9b59b6;
        color: #9b59b6;
      }
      .tag-quadril {
        border-color: #e67e22;
        color: #e67e22;
      }
      .tag.active {
        color: #1a1a1a !important;
      }
      .tag-tornD.active {
        background: #3498db;
      }
      .tag-tornE.active {
        background: #9b59b6;
      }
      .tag-quadril.active {
        background: #e67e22;
      }

      textarea {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        background: #262626;
        color: var(--text-main);
        min-height: 80px;
        margin-bottom: 20px;
        box-sizing: border-box;
      }
      button.save-btn {
        width: 80%;
        margin-left: auto;
        display: block;
        padding: 16px;
        background: var(--secondary);
        color: #1a1a1a;
        border: none;
        border-radius: 8px;
        font-size: 1.2rem;
        font-weight: bold;
        cursor: pointer;
      }

      .bottom-actions {
        position: fixed;
        bottom: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .action-fab {
        background: #34495e;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 50%;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        cursor: pointer;
        font-size: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 60px;
        height: 60px;
      }
      .action-fab.ai-btn {
        background: #8e44ad;
      }
    </style>
  </head>
  <body>
    <div id="loginScreen">
      <div class="logo-icon">🔥</div>
      <h1 style="color: var(--secondary); margin-top: 0; margin-bottom: 30px">
        PainMonitor
      </h1>

      <input
        type="email"
        id="emailInput"
        class="auth-input"
        placeholder="Seu e-mail"
      />
      <input
        type="password"
        id="passwordInput"
        class="auth-input"
        placeholder="Sua senha (mín. 6 letras)"
      />

      <div class="btn-group">
        <button class="login-btn" onclick="loginWithEmail()">Entrar</button>
        <button class="register-btn" onclick="createAccount()">
          Criar Conta
        </button>
      </div>
      <p id="loginError"></p>
    </div>

    <div id="appScreen">
      <div class="container">
        <div class="header-area">
          <h2>Registro de Dor</h2>
          <button class="logout-btn" onclick="logout()">Sair</button>
        </div>

        <div class="slider-container">
          <div id="painValueDisplay">0</div>
          <input
            type="range"
            id="painSlider"
            min="0"
            max="10"
            value="0"
            step="1"
          />
        </div>

        <h4 style="text-align: right">Localização</h4>
        <div class="tags" id="locationTags">
          <button
            class="tag tag-tornD"
            onclick="selectTag(this, 'Tornozelo D')"
          >
            TORN D
          </button>
          <button
            class="tag tag-tornE"
            onclick="selectTag(this, 'Tornozelo E')"
          >
            TORN E
          </button>
          <button class="tag tag-quadril" onclick="selectTag(this, 'Quadril')">
            QUADRIL
          </button>
        </div>

        <h4 style="text-align: right">Contexto</h4>
        <textarea
          id="contextInput"
          placeholder="O que causou? Clima?"
        ></textarea>

        <button class="save-btn" onclick="saveLog()">Registrar ➔</button>
      </div>
    </div>

    <div class="bottom-actions" id="actionButtons" style="display: none">
      <button
        class="action-fab ai-btn"
        onclick="analyzeDay()"
        title="Análise com IA"
      >
        ✨
      </button>
      <button class="action-fab" onclick="openChart()" title="Ver Gráfico">
        📊
      </button>
    </div>

    <div
      id="aiModal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 1000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        box-sizing: border-box;
      "
    >
      <div
        class="modal-content"
        style="
          background: var(--card-bg);
          width: 100%;
          max-width: 400px;
          padding: 24px;
          border-radius: 12px;
          position: relative;
          border: 1px solid #8e44ad;
          box-shadow: 0 0 20px rgba(142, 68, 173, 0.4);
        "
      >
        <button
          onclick="document.getElementById('aiModal').style.display = 'none'"
          style="
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            color: #ccc;
            cursor: pointer;
            background: none;
            border: none;
          "
        >
          ✖
        </button>
        <h3
          style="
            margin-top: 0;
            color: #8e44ad;
            display: flex;
            align-items: center;
            gap: 8px;
          "
        >
          ✨ Análise do Dia
        </h3>
        <p
          id="aiResponseText"
          style="line-height: 1.5; color: var(--text-main); font-size: 0.95rem"
        ></p>
      </div>
    </div>

    <script type="module">
      // 1. IMPORTAÇÃO PRINCIPAL (Essa era a linha que estava faltando!)
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
      
      // 2. Importações do Banco de Dados
      import {
        getFirestore,
        collection,
        addDoc,
        serverTimestamp,
        query,
        where,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
      
      // 3. Importações de E-mail e Senha
      import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDSK6mkMqp-Ivjbb3qoZUrkNfvuvjDrA2I",
        authDomain: "painmonitor-7bc13.firebaseapp.com",
        projectId: "painmonitor-7bc13",
        storageBucket: "painmonitor-7bc13.firebasestorage.app",
        messagingSenderId: "261972149086",
        appId: "1:261972149086:web:41422c1174f38415cd45cf",
      };

      const app = initializeApp(firebaseConfig); // Agora isso vai funcionar!
      const db = getFirestore(app);
      const auth = getAuth(app);
      let currentUser = null;

      // Controle de Autenticação
      onAuthStateChanged(auth, (user) => {
        if (user) {
          currentUser = user;
          document.getElementById("loginScreen").style.display = "none";
          document.getElementById("appScreen").style.display = "block";
          document.getElementById("actionButtons").style.display = "flex";
        } else {
          currentUser = null;
          document.getElementById("loginScreen").style.display = "flex";
          document.getElementById("appScreen").style.display = "none";
          document.getElementById("actionButtons").style.display = "none";
        }
      });

      // Função de Login
      window.loginWithEmail = () => {
        const email = document.getElementById("emailInput").value;
        const pass = document.getElementById("passwordInput").value;
        const errorMsg = document.getElementById("loginError");

        if (!email || !pass) {
          errorMsg.innerText = "Preencha e-mail e senha.";
          errorMsg.style.display = "block";
          return;
        }

        signInWithEmailAndPassword(auth, email, pass).catch((error) => {
          errorMsg.innerText = "Erro: E-mail ou senha incorretos.";
          errorMsg.style.display = "block";
        });
      };

      // Função de Criar Conta
      window.createAccount = () => {
        const email = document.getElementById("emailInput").value;
        const pass = document.getElementById("passwordInput").value;
        const errorMsg = document.getElementById("loginError");

        if (!email || !pass) {
          errorMsg.innerText = "Preencha e-mail e senha.";
          errorMsg.style.display = "block";
          return;
        }
        if (pass.length < 6) {
          errorMsg.innerText = "A senha precisa ter pelo menos 6 caracteres.";
          errorMsg.style.display = "block";
          return;
        }

        createUserWithEmailAndPassword(auth, email, pass).catch((error) => {
          if (error.code === "auth/email-already-in-use") {
            errorMsg.innerText =
              "Este e-mail já tem uma conta. Clique em Entrar.";
          } else {
            errorMsg.innerText =
              "Erro ao criar conta. Verifique o formato do e-mail.";
          }
          errorMsg.style.display = "block";
        });
      };

      window.logout = () => {
        signOut(auth);
      };

      // Lógica da Interface (Slider)
      const slider = document.getElementById("painSlider");
      const display = document.getElementById("painValueDisplay");

      function getColorForPain(value) {
        let r, g, b;
        if (value <= 5) {
          const pct = value / 5;
          r = Math.floor(52 + (241 - 52) * pct);
          g = Math.floor(152 + (196 - 152) * pct);
          b = Math.floor(219 + (15 - 219) * pct);
        } else {
          const pct = (value - 5) / 5;
          r = Math.floor(241 + (255 - 241) * pct);
          g = Math.floor(196 + (0 - 196) * pct);
          b = Math.floor(15 + (0 - 15) * pct);
        }
        return `rgb(${r}, ${g}, ${b})`;
      }

      slider.addEventListener("input", function () {
        const val = parseInt(this.value);
        display.textContent = val;
        display.style.color = getColorForPain(val);
      });
      display.style.color = getColorForPain(0);

      let selectedLocation = "";
      window.selectTag = function (element, locName) {
        document
          .querySelectorAll(".tag")
          .forEach((t) => t.classList.remove("active"));
        element.classList.add("active");
        selectedLocation = locName;
      };

      // Salvar Registro
      window.saveLog = async function () {
        const painLevel = parseInt(slider.value);
        const contextText = document.getElementById("contextInput").value;

        if (!currentUser) {
          alert("Você precisa estar logado!");
          return;
        }
        if (painLevel === 0 && !selectedLocation && !contextText) {
          alert("Preencha algum dado.");
          return;
        }

        const btn = document.querySelector(".save-btn");
        const textoOriginal = btn.innerText;
        btn.innerText = "Salvando...";
        btn.disabled = true;

        try {
          await addDoc(collection(db, "registros_dor"), {
            userId: currentUser.uid,
            intensidade: painLevel,
            localizacao: selectedLocation || "Outro",
            contexto: contextText,
            dataHora: serverTimestamp(),
          });

          slider.value = 0;
          slider.dispatchEvent(new Event("input"));
          document
            .querySelectorAll(".tag")
            .forEach((t) => t.classList.remove("active"));
          document.getElementById("contextInput").value = "";
          selectedLocation = "";

          btn.innerText = "Salvo ✔️";
          setTimeout(() => {
            btn.innerText = textoOriginal;
            btn.disabled = false;
          }, 2000);
        } catch (e) {
          console.error("Erro:", e);
          alert("Erro ao salvar.");
          btn.innerText = textoOriginal;
          btn.disabled = false;
        }
      };

      window.openChart = () => {
        alert("Gráfico temporariamente desativado para o teste de login.");
      };

      // Inteligência Artificial
      window.analyzeDay = async function () {
        if (!currentUser) {
          alert("Faça login para analisar dados.");
          return;
        }

        document.getElementById("aiModal").style.display = "flex";
        document.getElementById("aiResponseText").innerHTML =
          "<i>Lendo seus registros e consultando a IA...</i>";

        try {
          const q = query(
            collection(db, "registros_dor"),
            where("userId", "==", currentUser.uid)
          );
          const querySnapshot = await getDocs(q);

          const agora = new Date();
          const limite24h = new Date(agora.getTime() - 24 * 60 * 60 * 1000);
          let registrosTexto = "";
          let contagem = 0;

          querySnapshot.forEach((doc) => {
            const data = doc.data();
            if (data.dataHora) {
              const dataRegistro = data.dataHora.toDate();
              if (dataRegistro >= limite24h) {
                const horaStr = dataRegistro.toLocaleTimeString("pt-BR", {
                  hour: "2-digit",
                  minute: "2-digit",
                });
                registrosTexto += `- Às ${horaStr}: Dor nível ${
                  data.intensidade
                }/10 no(a) ${data.localizacao}. Contexto: "${
                  data.contexto || "Sem contexto"
                }"\n`;
                contagem++;
              }
            }
          });

          if (contagem === 0) {
            document.getElementById("aiResponseText").innerHTML =
              "Você não tem registros nas últimas 24 horas.";
            return;
          }

          const promptMestre = `Você é um analista de dados de saúde focado em dor crônica e sequelas ortopédicas. 
          Analise os registros das últimas 24h e resuma em um parágrafo:
          1. O pico de dor e o possível gatilho.
          2. Uma correlação ou padrão observado.
          3. Uma sugestão prática.
          Sem saudações.

          Registros:
          ${registrosTexto}`;

          const API_KEY = "AIzaSyAnjf2kQG2DK6Jmxj84jwqDHLZ5XEJbCzg";
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

          const resposta = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: promptMestre }] }],
            }),
          });

          const aiData = await resposta.json();
          if (aiData.error) throw new Error("Erro na API do Gemini");

          document.getElementById("aiResponseText").innerHTML =
            aiData.candidates[0].content.parts[0].text.replace(/\n/g, "<br>");
        } catch (e) {
          console.error(e);
          document.getElementById("aiResponseText").innerHTML =
            "Erro ao processar a análise.";
        }
      };
    </script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js");
        });
      }
    </script>
  </body>
</html>
