<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Monitor de Dor</title>

    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#c08457" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="PainMonitor" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      :root {
        --bg-color: #1a1a1a;
        --card-bg: #2d2d2d;
        --text-main: #f0e6d6;
        --secondary: #e6b38a;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: box-shadow 0.3s ease, background-color 0.3s ease;
      }

      /* Efeito de Emergência (Nível 10) */
      body.emergency {
        box-shadow: inset 0 0 50px 10px rgba(255, 0, 0, 0.5);
        background-color: #2a0a0a;
      }

      /* --- TELA SPLASH / LOGIN --- */
      #loginScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg-color);
        z-index: 2000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .logo-icon {
        font-size: 4rem;
        margin-bottom: 10px;
        text-shadow: 0 0 20px var(--secondary);
      }

      .auth-input {
        width: 80%;
        max-width: 280px;
        padding: 14px;
        margin-bottom: 12px;
        border-radius: 8px;
        border: 1px solid #4d4d4d;
        background: #262626;
        color: white;
        font-size: 1rem;
        box-sizing: border-box;
      }
      .auth-input:focus {
        outline: none;
        border-color: var(--secondary);
      }

      .btn-group {
        display: flex;
        gap: 10px;
        width: 80%;
        max-width: 280px;
        margin-top: 10px;
      }
      .login-btn {
        flex: 1;
        padding: 14px;
        border-radius: 8px;
        border: none;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        background: white;
        color: #1a1a1a;
      }
      .register-btn {
        flex: 1;
        padding: 14px;
        border-radius: 8px;
        border: 1px solid var(--secondary);
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        background: transparent;
        color: var(--secondary);
      }
      #loginError {
        color: #ff7f50;
        font-size: 0.9rem;
        margin-top: 15px;
        display: none;
        text-align: center;
        max-width: 280px;
      }

      /* --- APP PRINCIPAL --- */
      #appScreen {
        display: none;
        width: 100%;
        max-width: 400px;
        padding-bottom: 80px;
      }
      .container {
        background: var(--card-bg);
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        border: 1px solid #3d3d3d;
      }
      h2,
      h4 {
        color: var(--secondary);
        margin-top: 0;
      }
      .header-area {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logout-btn {
        background: none;
        border: 1px solid #666;
        color: #aaa;
        padding: 5px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.8rem;
      }

      .slider-container {
        text-align: center;
        margin: 20px 0;
      }
      #painValueDisplay {
        font-size: 4rem;
        font-weight: bold;
        transition: color 0.3s;
      }
      input[type="range"] {
        width: 100%;
        margin: 15px 0;
      }

      /* Alerta SAMU */
      #samuAlert {
        display: none;
        background: #ff0000;
        padding: 15px;
        border-radius: 8px;
        text-align: center;
        margin-bottom: 20px;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7);
        }
        70% {
          box-shadow: 0 0 0 15px rgba(255, 0, 0, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(255, 0, 0, 0);
        }
      }
      #samuAlert a {
        color: white;
        text-decoration: none;
        font-weight: bold;
        font-size: 1.1rem;
        display: block;
      }

      /* Tags Restauradas */
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 25px;
        justify-content: flex-end;
      }
      .tag {
        padding: 12px 18px;
        border: 2px solid;
        border-radius: 25px;
        background: #262626;
        cursor: pointer;
        font-weight: bold;
      }

      .tag-tornD {
        border-color: #3498db;
        color: #3498db;
      }
      .tag-tornE {
        border-color: #9b59b6;
        color: #9b59b6;
      }
      .tag-quadril {
        border-color: #e67e22;
        color: #e67e22;
      }
      .tag-hernia {
        border-color: #1abc9c;
        color: #1abc9c;
      }
      .tag-esofago {
        border-color: #e84393;
        color: #e84393;
      }

      .tag.active {
        color: #1a1a1a !important;
      }
      .tag-tornD.active {
        background: #3498db;
      }
      .tag-tornE.active {
        background: #9b59b6;
      }
      .tag-quadril.active {
        background: #e67e22;
      }
      .tag-hernia.active {
        background: #1abc9c;
      }
      .tag-esofago.active {
        background: #e84393;
      }

      textarea {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        background: #262626;
        color: var(--text-main);
        min-height: 80px;
        margin-bottom: 20px;
        box-sizing: border-box;
      }
      button.save-btn {
        width: 80%;
        margin-left: auto;
        display: block;
        padding: 16px;
        background: var(--secondary);
        color: #1a1a1a;
        border: none;
        border-radius: 8px;
        font-size: 1.2rem;
        font-weight: bold;
        cursor: pointer;
      }

      .bottom-actions {
        position: fixed;
        bottom: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .action-fab {
        background: #34495e;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 50%;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        cursor: pointer;
        font-size: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 60px;
        height: 60px;
      }
      .action-fab.ai-btn {
        background: #8e44ad;
      }
    </style>
  </head>
  <body>
    <div id="loginScreen">
      <div class="logo-icon">🔥</div>
      <h1 style="color: var(--secondary); margin-top: 0; margin-bottom: 30px">
        PainMonitor
      </h1>
      <input
        type="email"
        id="emailInput"
        class="auth-input"
        placeholder="Seu e-mail"
      />
      <input
        type="password"
        id="passwordInput"
        class="auth-input"
        placeholder="Sua senha (mín. 6 letras)"
      />
      <div class="btn-group">
        <button class="login-btn" onclick="loginWithEmail()">Entrar</button>
        <button class="register-btn" onclick="createAccount()">
          Criar Conta
        </button>
      </div>
      <p id="loginError"></p>
    </div>

    <div id="appScreen">
      <div class="container">
        <div class="header-area">
          <h2>Registro de Dor</h2>
          <button class="logout-btn" onclick="logout()">Sair</button>
        </div>

        <div class="slider-container">
          <div id="painValueDisplay">0</div>
          <input
            type="range"
            id="painSlider"
            min="0"
            max="10"
            value="0"
            step="1"
          />
        </div>

        <div id="samuAlert">
          <a href="tel:192">⚠️ DOR EXTREMA: LIGAR SAMU (192)</a>
        </div>

        <h4 style="text-align: right">Onde dói?</h4>
        <div class="tags" id="locationTags">
          <button
            class="tag tag-tornD"
            onclick="selectTag(this, 'Tornozelo Direito', '#3498db')"
          >
            TORNOZELO D
          </button>
          <button
            class="tag tag-tornE"
            onclick="selectTag(this, 'Tornozelo Esquerdo', '#9b59b6')"
          >
            TORNOZELO E
          </button>
          <button
            class="tag tag-quadril"
            onclick="selectTag(this, 'Quadril', '#e67e22')"
          >
            QUADRIL
          </button>
          <button
            class="tag tag-hernia"
            onclick="selectTag(this, 'Hérnia', '#1abc9c')"
          >
            HÉRNIA
          </button>
          <button
            class="tag tag-esofago"
            onclick="selectTag(this, 'Esôfago', '#e84393')"
          >
            ESÔFAGO
          </button>
        </div>

        <h4 style="text-align: right">Contexto</h4>
        <textarea
          id="contextInput"
          placeholder="O que você estava fazendo?"
        ></textarea>

        <button class="save-btn" onclick="saveLog()">Registrar ➔</button>
      </div>
    </div>

    <div class="bottom-actions" id="actionButtons" style="display: none">
      <button
        class="action-fab ai-btn"
        onclick="analyzeDay()"
        title="Análise com IA"
      >
        ✨
      </button>
      <button class="action-fab" onclick="openChart()" title="Ver Gráfico">
        📊
      </button>
    </div>

    <div
      id="aiModal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 1000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        box-sizing: border-box;
      "
    >
      <div
        class="modal-content"
        style="
          background: var(--card-bg);
          width: 100%;
          max-width: 400px;
          padding: 24px;
          border-radius: 12px;
          position: relative;
          border: 1px solid #8e44ad;
          box-shadow: 0 0 20px rgba(142, 68, 173, 0.4);
        "
      >
        <button
          onclick="document.getElementById('aiModal').style.display = 'none'"
          style="
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            color: #ccc;
            cursor: pointer;
            background: none;
            border: none;
          "
        >
          ✖
        </button>
        <h3
          style="
            margin-top: 0;
            color: #8e44ad;
            display: flex;
            align-items: center;
            gap: 8px;
          "
        >
          ✨ Análise dos Últimos 10 Dias
        </h3>
        <p
          id="aiResponseText"
          style="line-height: 1.5; color: var(--text-main); font-size: 0.95rem"
        ></p>
      </div>
    </div>

    <div
      id="chartModal"
      style="
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 1000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        box-sizing: border-box;
      "
    >
      <div
        class="modal-content"
        style="
          background: var(--card-bg);
          width: 100%;
          max-width: 600px;
          padding: 20px;
          border-radius: 12px;
          position: relative;
        "
      >
        <button
          onclick="document.getElementById('chartModal').style.display = 'none'"
          style="
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5rem;
            color: #ccc;
            cursor: pointer;
            background: none;
            border: none;
          "
        >
          ✖
        </button>
        <h3 style="margin-top: 0; color: var(--secondary); text-align: center">
          Seus Padrões
        </h3>
        <p id="loadingChartText" style="text-align: center; color: #888">
          Buscando dados na nuvem...
        </p>
        <canvas
          id="painChart"
          style="
            background: #1a1a1a;
            border-radius: 8px;
            padding: 10px;
            margin-top: 15px;
          "
        ></canvas>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
        serverTimestamp,
        query,
        where,
        getDocs,
      } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDSWTAS0QT7YlPayURFIbjuYd_mVk_YGJU",
        authDomain: "painmonitor-7bc13.firebaseapp.com",
        projectId: "painmonitor-7bc13",
        storageBucket: "painmonitor-7bc13.firebasestorage.app",
        messagingSenderId: "261972149086",
        appId: "1:261972149086:web:41422c1174f38415cd45cf",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);
      let currentUser = null;

      onAuthStateChanged(auth, (user) => {
        if (user) {
          currentUser = user;
          document.getElementById("loginScreen").style.display = "none";
          document.getElementById("appScreen").style.display = "block";
          document.getElementById("actionButtons").style.display = "flex";
        } else {
          currentUser = null;
          document.getElementById("loginScreen").style.display = "flex";
          document.getElementById("appScreen").style.display = "none";
          document.getElementById("actionButtons").style.display = "none";
        }
      });

      window.loginWithEmail = () => {
        const email = document.getElementById("emailInput").value;
        const pass = document.getElementById("passwordInput").value;
        const errorMsg = document.getElementById("loginError");
        if (!email || !pass) {
          errorMsg.innerText = "Preencha e-mail e senha.";
          errorMsg.style.display = "block";
          return;
        }
        signInWithEmailAndPassword(auth, email, pass).catch(() => {
          errorMsg.innerText = "Erro: E-mail ou senha incorretos.";
          errorMsg.style.display = "block";
        });
      };

      window.createAccount = () => {
        const email = document.getElementById("emailInput").value;
        const pass = document.getElementById("passwordInput").value;
        const errorMsg = document.getElementById("loginError");
        if (!email || !pass) {
          errorMsg.innerText = "Preencha e-mail e senha.";
          errorMsg.style.display = "block";
          return;
        }
        if (pass.length < 6) {
          errorMsg.innerText = "A senha precisa ter pelo menos 6 caracteres.";
          errorMsg.style.display = "block";
          return;
        }
        createUserWithEmailAndPassword(auth, email, pass).catch((error) => {
          if (error.code === "auth/email-already-in-use") {
            errorMsg.innerText =
              "Este e-mail já tem uma conta. Clique em Entrar.";
          } else {
            errorMsg.innerText =
              "Erro ao criar conta. Verifique o formato do e-mail.";
          }
          errorMsg.style.display = "block";
        });
      };

      window.logout = () => {
        signOut(auth);
      };

      const slider = document.getElementById("painSlider");
      const display = document.getElementById("painValueDisplay");
      const samuAlert = document.getElementById("samuAlert");
      const body = document.body;

      function getColorForPain(value) {
        let r, g, b;
        if (value <= 5) {
          const pct = value / 5;
          r = Math.floor(52 + (241 - 52) * pct);
          g = Math.floor(152 + (196 - 152) * pct);
          b = Math.floor(219 + (15 - 219) * pct);
        } else {
          const pct = (value - 5) / 5;
          r = Math.floor(241 + (255 - 241) * pct);
          g = Math.floor(196 + (0 - 196) * pct);
          b = Math.floor(15 + (0 - 15) * pct);
        }
        return `rgb(${r}, ${g}, ${b})`;
      }

      slider.addEventListener("input", function () {
        const val = parseInt(this.value);
        display.textContent = val;
        display.style.color = getColorForPain(val);

        if (val === 10) {
          samuAlert.style.display = "block";
          body.classList.add("emergency");
        } else {
          samuAlert.style.display = "none";
          body.classList.remove("emergency");
        }
      });
      display.style.color = getColorForPain(0);

      let selectedLocation = "";
      let selectedColor = ""; 
      window.selectTag = function (element, locName, colorCode) {
        document
          .querySelectorAll(".tag")
          .forEach((t) => t.classList.remove("active"));
        element.classList.add("active");
        selectedLocation = locName;
        selectedColor = colorCode;
      };

      window.saveLog = async function () {
        const painLevel = parseInt(slider.value);
        const contextText = document.getElementById("contextInput").value;

        if (!currentUser) {
          alert("Você precisa estar logado!");
          return;
        }
        if (painLevel === 0 && !selectedLocation && !contextText) {
          alert("Preencha algum dado.");
          return;
        }

        const btn = document.querySelector(".save-btn");
        const textoOriginal = btn.innerText;
        btn.innerText = "Salvando...";
        btn.disabled = true;

        try {
          await addDoc(collection(db, "registros_dor"), {
            userId: currentUser.uid,
            intensidade: painLevel,
            localizacao: selectedLocation || "Outro",
            corOriginal: selectedColor || "#cccccc", 
            contexto: contextText,
            dataHora: serverTimestamp(),
          });

          slider.value = 0;
          slider.dispatchEvent(new Event("input"));
          document
            .querySelectorAll(".tag")
            .forEach((t) => t.classList.remove("active"));
          document.getElementById("contextInput").value = "";
          selectedLocation = "";
          selectedColor = "";

          btn.innerText = "Salvo ✔️";
          setTimeout(() => {
            btn.innerText = textoOriginal;
            btn.disabled = false;
          }, 2000);
        } catch (e) {
          console.error("Erro:", e);
          alert("Erro ao salvar.");
          btn.innerText = textoOriginal;
          btn.disabled = false;
        }
      };

      // --- LÓGICA DO GRÁFICO ---
      let painChartInstance = null;
      window.openChart = async function () {
        if (!currentUser) return;
        document.getElementById("chartModal").style.display = "flex";
        document.getElementById("loadingChartText").style.display = "block";

        try {
          const q = query(
            collection(db, "registros_dor"),
            where("userId", "==", currentUser.uid)
          );
          const querySnapshot = await getDocs(q);

          let registros = [];
          querySnapshot.forEach((doc) => {
            const data = doc.data();
            if (data.dataHora) registros.push(data);
          });

          registros.sort(
            (a, b) => a.dataHora.toMillis() - b.dataHora.toMillis()
          );

          const datasets = {};
          registros.forEach((data) => {
            const dataObj = data.dataHora.toDate();
            const diaStr = dataObj.toLocaleDateString("pt-BR", {
              day: "2-digit",
              month: "2-digit",
            });
            const horaDecimal = dataObj.getHours() + dataObj.getMinutes() / 60;

            if (!datasets[data.localizacao]) {
              datasets[data.localizacao] = {
                label: data.localizacao,
                backgroundColor: (data.corOriginal || "#ccc") + "80",
                borderColor: data.corOriginal || "#ccc",
                data: [],
              };
            }
            datasets[data.localizacao].data.push({
              x: diaStr,
              y: horaDecimal,
              r: data.intensidade * 3,
            });
          });

          const chartData = { datasets: Object.values(datasets) };
          document.getElementById("loadingChartText").style.display = "none";
          renderChart(chartData);
        } catch (e) {
          console.error("Erro no gráfico:", e);
          document.getElementById("loadingChartText").innerText =
            "Erro ao carregar dados.";
        }
      };

      function renderChart(chartData) {
        const ctx = document.getElementById("painChart").getContext("2d");
        if (painChartInstance) painChartInstance.destroy();

        painChartInstance = new Chart(ctx, {
          type: "bubble",
          data: chartData,
          options: {
            responsive: true,
            scales: {
              y: {
                title: { display: true, text: "Hora do Dia", color: "#ccc" },
                min: 0,
                max: 24,
                ticks: {
                  color: "#888",
                  stepSize: 4,
                  callback: function (value) {
                    return value + "h";
                  },
                },
                grid: { color: "#333" },
              },
              x: {
                title: { display: true, text: "Data", color: "#ccc" },
                ticks: { color: "#888" },
                grid: { color: "#333" },
              },
            },
            plugins: { legend: { labels: { color: "#ccc" } } },
          },
        });
      }

     // --- INTELIGÊNCIA ARTIFICIAL (COM ANTI-BLOQUEIO E DEDO-DURO) ---
      window.analyzeDay = async function () {
        if (!currentUser) {
          alert("Faça login para analisar dados.");
          return;
        }

        document.getElementById("aiModal").style.display = "flex";
        document.getElementById("aiResponseText").innerHTML =
          "<i>Lendo seus registros e consultando a IA...</i>";

        try {
          const q = query(collection(db, "registros_dor"), where("userId", "==", currentUser.uid));
          const querySnapshot = await getDocs(q);

          const agora = new Date();
          const limite10Dias = new Date(agora.getTime() - 10 * 24 * 60 * 60 * 1000);
          let registrosTexto = "";
          let contagem = 0;

          querySnapshot.forEach((doc) => {
            const data = doc.data();
            if (data.dataHora) {
              const dataRegistro = data.dataHora.toDate();

              if (dataRegistro >= limite10Dias) {
                const dataStr = dataRegistro.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" });
                const horaStr = dataRegistro.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });

                registrosTexto += `- Dia ${dataStr} às ${horaStr}: Dor nível ${data.intensidade}/10 no(a) ${data.localizacao}. Contexto: "${data.contexto || "Sem contexto"}"\n`;
                contagem++;
              }
            }
          });

          if (contagem === 0) {
            document.getElementById("aiResponseText").innerHTML = "Você não tem registros nos últimos 10 dias.";
            return;
          }

          // Deixei o prompt mais brando para não assustar o filtro médico
          const promptMestre = `Atue como um assistente de organização de rotina. 
          Leia o diário de desconforto físico dos últimos 10 dias do usuário e escreva um único parágrafo com:
          1. O dia e horário de maior nível relatado e o que ele estava fazendo.
          2. Algum padrão que você notar (ex: horários que mais se repetem).
          3. Um lembrete amigável de autocuidado.
          Não dê diagnósticos médicos. Seja direto e sem saudações.
          
          Diário: ${registrosTexto}`;

          const API_KEY = "AIzaSyAnjf2kQG2DK6Jmxj84jwqDHLZ5XEJbCzg";
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;
          const resposta = await fetch(url, {
            method: "POST", 
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
              contents: [{ parts: [{ text: promptMestre }] }],
              // Abaixando os escudos de segurança do Gemini
              safetySettings: [
                { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" },
                { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" }
              ]
            }),
          });

          const aiData = await resposta.json();
          
          // Dedo-duro 1: Erro de chave ou servidor
          if (aiData.error) {
            console.error("Erro da API:", aiData.error);
            document.getElementById("aiResponseText").innerHTML = `<b>Erro do Google:</b> ${aiData.error.message}`;
            return;
          }

          // Dedo-duro 2: Bloqueio de Segurança
          if (!aiData.candidates || !aiData.candidates[0].content) {
             console.error("Resposta Bloqueada:", aiData);
             document.getElementById("aiResponseText").innerHTML = "<b>Aviso:</b> O Google Gemini bloqueou a resposta por achar que é um conselho médico. Verifique o console para mais detalhes.";
             return;
          }

          // Se deu tudo certo, exibe o texto!
          document.getElementById("aiResponseText").innerHTML = aiData.candidates[0].content.parts[0].text.replace(/\n/g, "<br>");
          
        } catch (e) {
          console.error("Erro interno:", e); 
          document.getElementById("aiResponseText").innerHTML = `Erro interno do aplicativo: ${e.message}`;
        }
      }; // FIM DA FUNÇÃO
    </script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js");
        });
      }
    </script>
