<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Dor - Modo Quente</title>
    <style>
        :root {
            --bg-color: #1a1a1a; /* Preto de tom quente */
            --card-bg: #2d2d2d;
            --text-main: #f0e6d6; /* Off-white quente */
            --primary: #c08457; /* Cobre quente */
            --primary-dark: #a66f46;
            --secondary: #e6b38a; /* Bronze claro */
            --accent: #ff7f50; /* Coral para picos */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            border: 1px solid #3d3d3d;
        }
        h2 { margin-top: 0; font-size: 1.5rem; text-align: center; color: var(--secondary); }
        
        /* Slider de Dor */
        .slider-container { text-align: center; margin: 20px 0; }
        #painValueDisplay {
            font-size: 3.5rem;
            font-weight: bold;
            transition: color 0.3s ease;
            text-shadow: 0 0 10px rgba(192, 132, 87, 0.5);
        }
        input[type=range] {
            width: 100%;
            margin: 15px 0;
            cursor: pointer;
            accent-color: var(--primary);
        }

        /* Tags de Localização */
        .tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; justify-content: center; }
        .tag {
            padding: 10px 20px;
            border: 2px solid #4d4d4d;
            border-radius: 25px;
            background: #262626;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.2s ease;
        }
        .tag:hover {
            border-color: var(--secondary);
            background: #333;
        }
        .tag.active {
            background: var(--primary);
            color: #1a1a1a;
            border-color: var(--primary);
            font-weight: bold;
            box-shadow: 0 0 10px rgba(192, 132, 87, 0.4);
        }

        /* Contexto */
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #4d4d4d;
            border-radius: 8px;
            background: #262626;
            color: var(--text-main);
            box-sizing: border-box;
            font-family: inherit;
            resize: vertical;
            min-height: 90px;
            margin-bottom: 20px;
        }
        textarea:focus {
            outline: none;
            border-color: var(--secondary);
        }

        /* Botão Salvar */
        button.save-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: #1a1a1a;
            border: none;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button.save-btn:hover { background: var(--secondary); }
        button.save-btn:active { background: var(--primary-dark); }

        /* Histórico */
        .history { width: 100%; max-width: 400px; }
        .history h3 { color: var(--secondary); text-align: center; }
        .log-item {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 6px solid #4d4d4d;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            border: 1px solid #3d3d3d;
        }
        .log-header { display: flex; justify-content: space-between; margin-bottom: 10px; color: #a0a0a0; font-size: 0.85rem; }
        .log-title { font-weight: bold; font-size: 1.15rem; color: var(--text-main); }
        .log-context { font-size: 0.95rem; color: #c0c0c0; margin-top: 10px; font-style: italic; background: rgba(255,255,255,0.03); padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Como está sua dor?</h2>
        
        <div class="slider-container">
            <div id="painValueDisplay">0</div>
            <input type="range" id="painSlider" min="0" max="10" value="0" step="1">
        </div>

        <h4>Localização</h4>
        <div class="tags" id="locationTags">
            <button class="tag" onclick="selectTag(this)">torn D</button>
            <button class="tag" onclick="selectTag(this)">torn E</button>
            <button class="tag" onclick="selectTag(this)">Outro</button>
        </div>

        <h4>Contexto</h4>
        <textarea id="contextInput" placeholder="Ex: Ao acordar, após caminhar, tempo frio..."></textarea>

        <button class="save-btn" onclick="saveLog()">Registrar Dor</button>
    </div>

    <div class="history" id="historyContainer">
        </div>

    <script>
        // Lógica da cor do Slider - Mantendo a lógica de cor para intensidade, mas ajustando os tons
        const slider = document.getElementById('painSlider');
        const display = document.getElementById('painValueDisplay');

        function getColorForPain(value) {
            if (value == 0) return '#f0e6d6'; // Off-white quente para sem dor
            // Interpola de Bronze (1) para Coral/Vermelho Quente (10)
            const r = Math.floor(192 + (value * (255 - 192) / 10));
            const g = Math.floor(132 + (value * (127 - 132) / 10));
            const b = Math.floor(87 + (value * (80 - 87) / 10));
            return `rgb(${r}, ${g}, ${b})`;
        }

        slider.addEventListener('input', function() {
            display.textContent = this.value;
            display.style.color = getColorForPain(this.value);
        });

        // Inicializa a cor
        display.style.color = getColorForPain(0);

        // Lógica de seleção de Tags
        let selectedLocation = "Não informada";
        function selectTag(element) {
            document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            selectedLocation = element.innerText;
        }

        // Lógica de Salvar no LocalStorage
        function saveLog() {
            const painLevel = slider.value;
            const context = document.getElementById('contextInput').value;
            const now = new Date();
            
            if (painLevel == 0 && selectedLocation === "Não informada" && !context) {
                alert("Por favor, preencha pelo menos um campo para registrar.");
                return;
            }

            const logEntry = {
                id: Date.now(),
                date: now.toLocaleDateString('pt-BR'),
                time: now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }),
                level: painLevel,
                location: selectedLocation,
                context: context
            };

            let logs = JSON.parse(localStorage.getItem('painLogs')) || [];
            logs.unshift(logEntry); // Adiciona no início da lista
            localStorage.setItem('painLogs', JSON.stringify(logs));

            // Reseta o formulário
            slider.value = 0;
            display.textContent = 0;
            display.style.color = getColorForPain(0);
            document.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
            document.getElementById('contextInput').value = '';
            selectedLocation = "Não informada";

            renderHistory();
        }

        // Lógica para exibir os dados
        function renderHistory() {
            const container = document.getElementById('historyContainer');
            container.innerHTML = '<h3>Últimos Registros</h3>';
            
            let logs = JSON.parse(localStorage.getItem('painLogs')) || [];
            
            if (logs.length === 0) {
                container.innerHTML += '<p style="color: #a0a0a0; text-align: center;">Nenhum registro ainda.</p>';
                return;
            }

            logs.forEach(log => {
                const logDiv = document.createElement('div');
                logDiv.className = 'log-item';
                
                // Define a cor da borda com base na intensidade da dor
                const borderColor = log.level > 0 ? getColorForPain(log.level) : '#4d4d4d';
                logDiv.style.borderLeftColor = borderColor;
                
                logDiv.innerHTML = `
                    <div class="log-header">
                        <span>📅 ${log.date} às ${log.time}</span>
                    </div>
                    <div class="log-title">Nível ${log.level}/10 - ${log.location}</div>
                    ${log.context ? `<p class="log-context">"${log.context}"</p>` : ''}
                `;
                container.appendChild(logDiv);
            });
        }

        // Carrega o histórico ao abrir a página
        renderHistory();
    </script>
</body>
</html>
